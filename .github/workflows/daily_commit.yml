name: Daily Commit

on:
  schedule:
    # Runs daily at 00:00 IST (~18:30 UTC)
    - cron: "30 18 * * *"
  workflow_dispatch: {}

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create daily commit
        run: |
          echo "Daily commit at $(date -u)" > generator/heartbeat.txt

          git config user.name "Sagnik Chakraborty"
          git config user.email "sagnikgraviton847@gmail.com"

          git add generator/heartbeat.txt
          git commit -m "Daily auto-commit: maintain activity streak"
          git push
